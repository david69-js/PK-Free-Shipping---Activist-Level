query Input {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    deliveryGroups {
      id
      deliveryAddress {
        countryCode
      }
      deliveryOptions {
        handle
        title
        cost {
          amount
        }
      }
    }
    buyerIdentity {
      customer {
        id
        hasTags(tags: [
          "tier: Activist"
        ]) {
          tag
          hasTag
        }
      }
    }
  }
  discount {
    metafield(namespace: "$app", key: "free-shipping-activist-level") {
      jsonValue
    }
  }
}